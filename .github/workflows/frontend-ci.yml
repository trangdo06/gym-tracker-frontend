name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Dependencies installieren
        run: npm install
      - name: Frontend build testen
        run: npm run build